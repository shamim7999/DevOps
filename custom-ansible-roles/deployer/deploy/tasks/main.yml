---
- name: Create logs directory
  file:
    path: "{{ log_dir }}/app.log"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy docker-compose file
  copy:
    src: files/docker-compose-prod.yml
    dest: "{{ app_dir }}/docker-compose-prod.yml"
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Copy .env file
  copy:
    src: files/.env
    dest: "{{ app_dir }}/.env"
    owner: ubuntu
    group: ubuntu
    mode: '0600'

- name: Pull latest image
  command: docker compose -f docker-compose-prod.yml pull
  args:
    chdir: "{{ app_dir }}"

- name: Stop existing containers
  command: docker compose -f docker-compose-prod.yml down
  args:
    chdir: "{{ app_dir }}"
  ignore_errors: true

- name: Start containers with new image
  command: docker compose -f docker-compose-prod.yml up -d
  args:
    chdir: "{{ app_dir }}"
  environment:
    IMAGE_TAG: "{{ image_tag }}"

- name: Health check
  uri:
    url: "{{ health_checker_url }}"
    status_code: 200
    timeout: 30
  register: health_result
  retries: 6
  delay: 10
  until: health_result.status == 200
