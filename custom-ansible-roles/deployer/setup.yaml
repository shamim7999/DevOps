---
- name: Bootstrap managed nodes
  hosts: managed
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes  
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker Compose plugin
      apt:
        name: docker-compose-v2
        state: present

    - name: Create app directory
      file:
        path: /home/ubuntu/e-ticket
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
